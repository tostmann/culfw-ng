version: '3'
services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - /opt/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    network_mode: host

  matter-server:
    container_name: matter-server
    image: "ghcr.io/home-assistant-libs/python-matter-server:stable"
    volumes:
      - /opt/matter-server/data:/data
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    network_mode: host
    environment:
      - MATTER_SERVER_STORAGE_DIR=/data

  otbr:
    container_name: otbr
    image: "openthread/otbr:latest"
    # volumes:
    #  - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/ttyACM3:/dev/ttyACM3
    environment:
      - NAT64=0
      - NAT44=0
      - FIREWALL=0
      - DOCKER=0
      - INFRA_IF_NAME=eth0
      - THREAD_IF_NAME=wpan0
      - HTTP_PORT=8081
      - HTTP_HOST=0.0.0.0
      - REST_HOST=0.0.0.0
    command: ["--radio-url", "spinel+hdlc+uart:///dev/ttyACM3?uart-baudrate=460800&uart-reset", "-B", "eth0", "-I", "wpan0"]
