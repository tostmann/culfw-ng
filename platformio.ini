[env:cul32-c6]
platform = espressif32
board = esp32-c6-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags = 
    -D CORE_DEBUG_LEVEL=5
    -D GPIO_GDO0=2
    -D GPIO_GDO2=3
    -D GPIO_SS=18
    -D GPIO_SCK=19
    -D GPIO_MISO=20
    -D GPIO_MOSI=21
    -D GPIO_LED=8
    -D GPIO_SW=9
    -D GPIO_433MARKER=4
    -D BUILD_NUMBER=2
    -D FW_VERSION=\"1.0.2-NG\"
